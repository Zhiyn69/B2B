<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - B2B (Bersih Bersih Bandung)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        primary: '#1a2c7a',
                        primaryDark: '#12205c',
                        secondary: '#24751b',
                        secondaryDark: '#195413',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1); 
            if (hash) {
                const targetBtn = document.querySelector(`.filter-btn[data-filter="${hash}"]`);
                if (targetBtn) {
                    targetBtn.click();
                    document.getElementById('filterContainer').scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #1a2c7a; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-200 font-sans transition-colors duration-300">

    <nav class="sticky top-0 z-40 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center text-gray-600 hover:text-primary dark:text-gray-300 dark:hover:text-blue-400 font-medium transition group">
                    <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Kembali
                </a>
                
                <div class="text-2xl font-extrabold tracking-tight">
                    <span class="text-primary dark:text-blue-400">B</span><span class="text-secondary dark:text-green-500">2</span><span class="text-primary dark:text-blue-400">B</span> <span class="text-gray-400 font-medium text-lg ml-2 hidden sm:inline-block">| Katalog Produk</span>
                </div>
                
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition focus:outline-none">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-primary dark:bg-gray-900 pt-16 pb-24 border-b border-primaryDark dark:border-gray-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-6">Katalog Produk & Perlengkapan</h1>
            
            <div class="max-w-2xl mx-auto relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-search text-gray-400"></i>
                </div>
                <input type="text" id="searchInput" class="block w-full pl-11 pr-4 py-4 border border-transparent rounded-xl leading-5 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all shadow-lg" placeholder="Cari produk (Cth: Clax, Taski, R4)...">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-10 mb-24 relative z-10">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-2 flex flex-wrap justify-center gap-2 mb-10 border border-gray-100 dark:border-gray-700 transition-colors duration-300" id="filterContainer">
            <button class="filter-btn active px-6 py-2 rounded-lg text-sm font-bold bg-primary text-white transition-all" data-filter="Semua">Semua</button>
            <button class="filter-btn px-6 py-2 rounded-lg text-sm font-bold bg-transparent text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all" data-filter="Chemical">Chemical</button>
            <button class="filter-btn px-6 py-2 rounded-lg text-sm font-bold bg-transparent text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all" data-filter="Mesin">Mesin & Alat</button>
            <button class="filter-btn px-6 py-2 rounded-lg text-sm font-bold bg-transparent text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all" data-filter="Aksesori">Aksesori</button>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        
        <div id="noProductMsg" class="hidden text-center py-20">
            <i class="fa-solid fa-box-open text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-600 dark:text-gray-400">Produk tidak ditemukan</h3>
            <p class="text-gray-500 mt-2">Coba gunakan kata kunci pencarian yang lain.</p>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div id="modalContent" class="inline-block align-bottom bg-white dark:bg-gray-900 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl w-full border border-gray-100 dark:border-gray-800 modal-enter">
                <div class="absolute top-0 right-0 pt-4 pr-4 z-10">
                    <button type="button" class="bg-white dark:bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-500 focus:outline-none shadow-md" onclick="closeModal()">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <div class="sm:flex">
                    <div class="w-full sm:w-2/5 bg-gray-50 dark:bg-gray-800 p-8 flex items-center justify-center">
                        <img id="modalImg" src="" alt="Product" class="max-h-64 object-contain drop-shadow-xl">
                    </div>
                    <div class="w-full sm:w-3/5 p-8">
                        <div class="uppercase tracking-wide text-xs font-bold text-secondary dark:text-green-500 mb-1" id="modalCategory">Kategori</div>
                        <h3 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2" id="modalTitle">Nama Produk</h3>
                        <p class="text-gray-600 dark:text-gray-400 mb-6 text-sm leading-relaxed" id="modalDesc">Deskripsi detail produk.</p>
                        <div class="mt-auto">
                            <a href="https://wa.me/62027382" target="_blank" class="w-full flex items-center justify-center px-4 py-3 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary hover:bg-primaryDark transition-colors focus:outline-none">
                                <i class="fa-brands fa-whatsapp text-lg mr-2 text-green-400"></i> Pesan Sekarang
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Diversey Clax Activ 4AP1",
                category: "Chemical",
                image: "b2bn/DiverseyClaxActiv4AP1.png",
                desc: "Bubuk pemutih berbasis oksigen yang dirancang khusus untuk penggunaan laundry profesional dan komersial."
            },
            {
                id: 2,
                name: "Diversey Clax Build Lite 12A1",
                category: "Chemical",
                image: "b2bn/DiverseyClaxBuildLite12A1.png",
                desc: "Alkali builder cair sebagai booster untuk membantu deterjen utama mengangkat noda berat berbasis lemak dan minyak."
            },
            {
                id: 3,
                name: "Diversey Clax Mild 33B1",
                category: "Chemical",
                image: "b2bn/DiverseyClaxMild33B1.png",
                desc: "Deterjen cair konsentrat yang efektif mencuci kain katun dan poliester dengan sistem manajemen kesadahan air."
            },
            {
                id: 4,
                name: "Diversey Demon Pine",
                category: "Chemical",
                image: "b2bn/DiverseyDemonPIne.png",
                desc: "Cairan pembersih lantai dengan aroma cemara yang segar dan efektif membunuh kuman."
            },
            {
                id: 5,
                name: "Diversey Diversol CX",
                category: "Chemical",
                image: "b2bn/DiverseyDiversolCX.png",
                desc: "Bubuk disinfektan dan pembersih berbasis klorin untuk sanitasi area dapur dan permukaan keras."
            },
            {
                id: 6,
                name: "Diversey Divossan Hypoclorit VT3",
                category: "Chemical",
                image: "b2bn/DiverseyDivossanHypocloritVT3.png",
                desc: "Disinfektan berbasis hipoklorit untuk aplikasi industri makanan dan minuman."
            },
            {
                id: 7,
                name: "Diversey Rust 6FL1",
                category: "Chemical",
                image: "b2bn/DiverseyRust6FL1.png",
                desc: "Cairan pembersih karat dan kerak mineral yang kuat untuk permukaan metal."
            },
            {
                id: 8,
                name: "Diversey Soft 5CL1",
                category: "Chemical",
                image: "b2bn/DiverseySoft5CL1.png",
                desc: "Pelembut pakaian konsentrat yang memberikan kelembutan ekstra dan aroma segar pada cucian laundry."
            },
            {
                id: 9,
                name: "Diversey Sonril Ultra",
                category: "Chemical",
                image: "b2bn/DiverseySonrilUltra.png",
                desc: "Pembersih serbaguna yang sangat kuat untuk menghilangkan noda minyak dan lemak pada lantai industri."
            },
            {
                id: 10,
                name: "Softcare Dese Spray",
                category: "Chemical",
                image: "b2bn/diverseysoftcaredesespray.png",
                desc: "Cairan sanitasi tangan instan yang aman bagi kulit dan efektif membunuh bakteri tanpa dibilas."
            },
            {
                id: 11,
                name: "Diversey Suspend Metal",
                category: "Chemical",
                image: "b2bn/diverseysuspendmetal.png",
                desc: "Cairan perawatan permukaan logam untuk mencegah oksidasi dan menjaga kilau material."
            },
            {
                id: 12,
                name: "Taski Aero 8/15 Plus Bag",
                category: "Aksesori",
                image: "b2bn/taskiaero815plus.png",
                desc: "Kantong debu vacuum cleaner berkualitas tinggi untuk menyaring partikel mikro secara maksimal."
            },
            {
                id: 13,
                name: "Taski Vacumat 22",
                category: "Mesin",
                image: "b2bn/taskivacuumat22.png",
                desc: "Mesin vacuum basah dan kering yang tangguh dengan daya hisap tinggi untuk kebutuhan industrial."
            }
        ];

        const grid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const noProductMsg = document.getElementById('noProductMsg');

        function renderProducts(dataToRender) {
            grid.innerHTML = '';
            if(dataToRender.length === 0) {
                noProductMsg.classList.remove('hidden');
            } else {
                noProductMsg.classList.add('hidden');
                dataToRender.forEach(product => {
                    const card = document.createElement('div');
                    card.className = "bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden flex flex-col group cursor-pointer";
                    card.onclick = () => openModal(product);
                    card.innerHTML = `
                        <div class="h-64 bg-gray-50 dark:bg-gray-800 p-8 flex items-center justify-center relative overflow-hidden">
                            <div class="absolute top-4 left-4 z-20 px-3 py-1.5 bg-white/95 dark:bg-gray-900/95 backdrop-blur shadow-md text-[10px] font-black uppercase tracking-widest rounded-lg text-secondary dark:text-green-500 border border-gray-100 dark:border-gray-700">
                                ${product.category}
                            </div>
                            <img src="${product.image}" alt="${product.name}" class="relative z-10 max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-500 drop-shadow-xl">
                        </div>
                        <div class="p-6 flex flex-col flex-grow border-t border-gray-50 dark:border-gray-800">
                            <h3 class="text-sm md:text-base font-extrabold text-gray-900 dark:text-white mb-4 leading-snug h-12 overflow-hidden">${product.name}</h3>
                            <button class="mt-auto w-full text-center text-xs font-bold text-primary dark:text-blue-400 border-2 border-primary/20 dark:border-blue-500/30 rounded-xl py-3 group-hover:bg-primary group-hover:text-white dark:group-hover:bg-blue-600 transition-all duration-300">Lihat Spesifikasi</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        renderProducts(products);

        let currentFilter = 'Semua';
        function filterAndSearch() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredData = products.filter(product => {
                const matchCategory = currentFilter === 'Semua' || product.category === currentFilter;
                const matchSearch = product.name.toLowerCase().includes(searchTerm) || product.desc.toLowerCase().includes(searchTerm);
                return matchCategory && matchSearch;
            });
            renderProducts(filteredData);
        }

        searchInput.addEventListener('input', filterAndSearch);
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-primary', 'text-white');
                    b.classList.add('bg-transparent', 'text-gray-600', 'dark:text-gray-300');
                });
                e.target.classList.remove('bg-transparent', 'text-gray-600', 'dark:text-gray-300');
                e.target.classList.add('bg-primary', 'text-white');
                currentFilter = e.target.getAttribute('data-filter');
                filterAndSearch();
            });
        });
        
        const modal = document.getElementById('productModal');
        const modalContent = document.getElementById('modalContent');
        const mImg = document.getElementById('modalImg');
        const mCat = document.getElementById('modalCategory');
        const mTitle = document.getElementById('modalTitle');
        const mDesc = document.getElementById('modalDesc');

        function openModal(product) {
            mImg.src = product.image;
            mCat.innerText = product.category;
            mTitle.innerText = product.name;
            mDesc.innerText = product.desc;
            modal.classList.remove('hidden');
            setTimeout(() => { modalContent.classList.add('modal-enter-active'); }, 10);
        }

        function closeModal() {
            modalContent.classList.remove('modal-enter-active');
            setTimeout(() => { modal.classList.add('hidden'); }, 300); 
        }

        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateIcons(isDark) {
            if (isDark) {
                darkIcon.classList.add('hidden'); lightIcon.classList.remove('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark'); updateIcons(true);
        } else {
            html.classList.remove('dark'); updateIcons(false);
        }

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            updateIcons(isDark);
        });
    </script>
</body>
</html>
